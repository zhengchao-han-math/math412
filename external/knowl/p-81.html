<div class="para">If <span class="process-math">\(f\)</span> is <dfn class="terminology">Lipschitz continuous</dfn> on <span class="process-math">\([a, b]\text{,}\)</span> namely, there exists some <span class="process-math">\(L &gt; 0\)</span> such that <span class="process-math">\(|f(x)-f(y)|\le L |y-x|\)</span> for any <span class="process-math">\(x, y\in [a, b]\text{,}\)</span> then <span class="process-math">\(f\)</span> is absolutely continuous on <span class="process-math">\([a, b]\text{.}\)</span>
</div>
