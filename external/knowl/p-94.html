<div class="para">Let <span class="process-math">\(f\)</span> be a function of bounded variation on <span class="process-math">\([a, b]\text{.}\)</span> Define <span class="process-math">\(g(x) :=V(f, [a, x])\text{.}\)</span> Then <span class="process-math">\(g(x)\)</span> is a monotone increasing function on <span class="process-math">\([a, b]\text{.}\)</span> We now prove that <span class="process-math">\(h(x):=g(x)-f(x)\)</span> is a monotone increasing function on <span class="process-math">\([a, b]\text{.}\)</span>
