<span class="type">Definition</span><span class="space"> </span><span class="codenumber">3.4</span><span class="period">.</span>
</h3> <div class="para logical">
<div class="para">A set <span class="process-math">\(S\subset \bbR\)</span> is said to have content <span class="process-math">\(0\text{,}\)</span> if for any <span class="process-math">\(\epsilon &gt;0\text{,}\)</span> there exists a <em class="emphasis">finite</em> cover <span class="process-math">\(\{I_{i}\} \)</span> of <span class="process-math">\(S\)</span> by intervals such that</div>
<div class="displaymath process-math">
\begin{equation*}
\sum_{i}\vert I_{i}\vert &lt; \epsilon.
\end{equation*}
