<div class="para">For complex valued functions <span class="process-math">\(f,  g\)</span> in <span class="process-math">\(\cC[a, b]\text{,}\)</span> a natural Hermitian inner product is <span class="process-math">\((f, g)=\int_{a}^{b} f(x)\overline{g(x)}\,dx\text{.}\)</span> This is consistent with the inner product introduced earlier  on <span class="process-math">\(\cC[a, b]\)</span> when <span class="process-math">\(f,  g\)</span> are real valued.</div>
