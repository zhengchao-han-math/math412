<span class="type">Definition</span><span class="space"> </span><span class="codenumber">3.1.11</span><span class="period">.</span><span class="space"> </span><span class="title">Orthonormal Vectors.</span>
</h3> A set of vectors <span class="process-math">\(\{\bv_{1}, \bv_{2},\cdots \}\)</span> (finite or infinite) in an inner product space <span class="process-math">\(V\)</span> is called an orthonormal set, if any two distinct vectors in this set are orthogonal to each other and each one is a unit vector.</article><span class="incontext"><a href="sec-orthogonal.html#definition-8" class="internal">in-context</a></span>
