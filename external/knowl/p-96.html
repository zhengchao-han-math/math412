<div class="para">An absolutely continuous function on <span class="process-math">\([a, b]\)</span> has bounded variation on <span class="process-math">\([a, b]\text{,}\)</span> therefore, according to <a href="" class="xref" data-knowl="./knowl/prop-bv-mono.html" title="Proposition 4.7">Proposition 4.7</a>, <a href="" class="xref" data-knowl="./knowl/thm-Lebes-diff.html" title="Theorem 4.4: Lebesgue's Differentiability Theorem of a Monotone Function">Theorem 4.4</a> and <a href="" class="xref" data-knowl="./knowl/prop-mono-int.html" title="Proposition 4.5: Integrability of the Derivative of a Monotone Function">Proposition 4.5</a>, has its derivative in <span class="process-math">\(L^{1}[a,  b]\text{.}\)</span>
