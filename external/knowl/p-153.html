<div class="para">Condition <a href="" class="xref" data-knowl="./knowl/locLip.html" title="Equation 3.2.1">(3.2.1)</a> implies that <span class="process-math">\(g(t)\)</span> is continuous at <span class="process-math">\(x\text{.}\)</span>  Note that if <span class="process-math">\(g'(x)\)</span> exists, then <a href="" class="xref" data-knowl="./knowl/locLip.html" title="Equation 3.2.1">(3.2.1)</a> is satisfied at <span class="process-math">\(x\text{.}\)</span> In fact, <a href="" class="xref" data-knowl="./knowl/locLip.html" title="Equation 3.2.1">(3.2.1)</a> is satisfied at <span class="process-math">\(x\)</span> if both the left derivative <span class="process-math">\(g'(x-)\)</span> and the right derivative <span class="process-math">\(g'(x+)\)</span> exist.</div>
