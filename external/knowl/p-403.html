<div class="para">Based on  Proposition <a href="" class="xref" data-knowl="./knowl/propos-upperlower-int.html" title="Proposition 5.1.7: Basic property of upper and lower integral of a bounded real-valued function defined on a rectangle">Proposition 5.1.7</a>, a <em class="emphasis">necessary condition</em> that <span class="process-math">\(f \)</span> be Riemann integrable on <span class="process-math">\(R\)</span> is that</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/propos-upperlower-int.html">
\begin{equation}
\lowint_{R} \, f  =\upint_{R}\, f.\tag{5.1.2}
\end{equation}
</div>
<div class="para">This turns out to be also <em class="emphasis">sufficient</em>.</div>
