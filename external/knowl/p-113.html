<div class="para">The expansion <a href="" class="xref" data-knowl="./knowl/Fsine.html" title="Equation 3.0.1">(3.0.1)</a> is a version of the Fourier series expansion. It turns out that we must choose <span class="process-math">\(c_{n}\)</span> such that</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/Fsine.html">
\begin{equation}
c_{n}= \frac{2}{l}  \int_{0}^l g(x) \sin \left(\frac{n \pi x}{l}\right) \, dx.\tag{3.0.2}
\end{equation}
