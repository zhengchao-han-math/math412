<article class="definition definition-like"><h3 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">4.4.1</span><span class="period">.</span>
</h3> A map <span class="process-math">\(\phi:X\mapsto X\)</span> of a metric space <span class="process-math">\((X, d)\)</span> to itself is called a contraction if there exists some <span class="process-math">\(c, 0\lt c \lt 1\text{,}\)</span> such that<div class="displaymath process-math">
\begin{equation*}
d(\phi(\bx), \phi(\by)) \le c\, d(\bx, \by) \quad \text{ for all $\bx, \by \in X$.}
\end{equation*}
</div></article><span class="incontext"><a href="section-contraction.html#def-contraction" class="internal">in-context</a></span>
