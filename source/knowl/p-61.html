<div class="para">Note that</div>
<div class="displaymath process-math">
\begin{equation}
\{x: f \text{ discontinuous at } x\}=
\cup_{k\in \bbN} \{y: \osc(f)(y)\ge \frac 1k\},\tag{3.1}
\end{equation}
</div>
<div class="para">namely, <span class="process-math">\(\{x: f \text{ discontinuous at } x\}\)</span> is a countable union of of the closed sets <span class="process-math">\(\{y: \osc(f)(y)\ge \frac 1k\}\text{.}\)</span>
</div>
