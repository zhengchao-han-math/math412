<div class="para">The oscillation of a function <span class="process-math">\(f\)</span>  at a point <span class="process-math">\(x\)</span> is defined to be</div>
<div class="displaymath process-math">
\begin{equation*}
\lim_{r\searrow 0} \osc(f, I\cap I(x, r)),
\end{equation*}
</div>
<div class="para">and is denoted as <span class="process-math">\(\osc(f)(x)\text{.}\)</span> Here <span class="process-math">\(I(x, r)\)</span> is the open interval of radius <span class="process-math">\(r\)</span> centered at <span class="process-math">\(x\text{.}\)</span>
</div>
