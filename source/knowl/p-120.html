<div class="para">Note that, since <span class="process-math">\((y, x)=(x, y)\text{,}\)</span> it follows that if <span class="process-math">\((x, y)=0\text{,}\)</span> then <span class="process-math">\((y, x)=0\text{.}\)</span> So the orthogonal relation is symmetric in <span class="process-math">\(x\)</span> and <span class="process-math">\(y\text{.}\)</span>
